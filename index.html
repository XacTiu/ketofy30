    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px">
      <div><img src="${LOGO_B64}" style="width:50px;height:50px;border-radius:12px"></div>
      <div style="text-align:right"><div style="font-size:14px;color:${t.tm}">Hola,</div><div style="font-size:16px;font-weight:600">${S.nm}</div></div>
    </div>
    <div style="background:${t.c1};border-radius:20px;padding:28px;margin-bottom:16px;border:1px solid ${t.bd};position:relative;overflow:hidden">
      <div style="position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:${t.ag}"></div>
      <div style="font-size:14px;color:${t.tm};letter-spacing:2px;font-weight:600">FASE ${ph} · ${PN[ph].toUpperCase()}</div>
      <div style="font-size:56px;font-weight:900;font-family:${t.f2};color:${t.ac};line-height:1">DÍA ${cd}</div>
      <div style="font-size:13px;color:${t.tm};margin-top:8px">${PD[ph]}</div>
      ${dd?.o?`<span style="display:inline-block;margin-top:8px;padding:4px 12px;background:${t.ag};color:${t.ac};border-radius:20px;font-size:12px;font-weight:700">OMAD</span>`:""}
      ${dd?.cl?`<span style="display:inline-block;margin-top:8px;padding:4px 12px;background:rgba(0,230,160,.15);color:${t.ok};border-radius:20px;font-size:12px;font-weight:700">CARGA LIMPIA</span>`:""}
    </div>
    <div style="background:${t.c1};border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid ${t.bd}">
      <div style="font-size:12px;color:${t.tm};letter-spacing:1px;font-weight:600;margin-bottom:12px">PROGRESO DE PESO</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:${t.tm};margin-bottom:8px"><span>${S.wt} kg</span><span>${S.gw} kg</span></div>
      <div style="height:8px;background:${t.c2};border-radius:4px;overflow:hidden"><div style="height:100%;width:${prog}%;background:linear-gradient(90deg,${t.ac},${t.ok});border-radius:4px;transition:width .5s"></div></div>
      <div style="font-size:12px;color:${t.td};margin-top:6px;text-align:center">${cc}/30 días completados</div>
    </div>
    ${dd?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
      ${[{l:"KCAL",v:dd.c,cl:t.ac},{l:"PROT",v:dd.p+"g",cl:"#ff6b6b"},{l:"GRASAS",v:dd.f+"g",cl:"#ffd93d"},{l:"CARBOS",v:dd.cb+"g",cl:"#6bcb77"}].map(m=>`<div style="background:${t.c1};border-radius:12px;padding:14px 8px;text-align:center;border:1px solid ${t.bd}"><div style="font-size:18px;font-weight:800;color:${m.cl}">${m.v}</div><div style="font-size:9px;color:${t.td};letter-spacing:1px;margin-top:4px;font-weight:600">${m.l}</div></div>`).join("")}
    </div>`:""}
    <button onclick="S.scr='menu';S._vd=${cd};render()" style="width:100%;padding:18px;background:${t.ac};color:#000;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:${t.f1};margin-bottom:12px">Ver menú de hoy</button>
    ${!S.cd?.[cd]?`<button onclick="S.cd=S.cd||{};S.cd[${cd}]=1;save();render()" style="width:100%;padding:16px;background:transparent;color:${t.ok};border:1px solid ${t.ok}33;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:${t.f1}">✓ Marcar día completado</button>`:`<div style="text-align:center;padding:16px;color:${t.ok};font-size:15px;font-weight:600">✓ Día ${cd} completado</div>`}
  </div>${nav(t)}`;
}

// ── MENU ──────────────────────────────────────────────
let _em=null,_ss=false;
function renderMenu(t){
  const vd=S._vd||1;
  const ph=gp(vd),dip=dp(vd);
  const dd=MD[S.g]?.[ph]?.[dip];
  if(!dd){$.innerHTML=`<div style="padding:60px 20px 100px;text-align:center;color:${t.tm}">No hay datos para el día ${vd}</div>${nav(t)}`;return;}
  
  let mealsHTML=dd.m.map((meal,i)=>{
    const exp=_em===i;
    return `<div style="background:${t.c1};border-radius:14px;margin-bottom:10px;border:1px solid ${t.bd};overflow:hidden">
      <button onclick="_em=_em===${i}?null:${i};renderMenu(TH['${S.g}'])" style="width:100%;padding:16px 18px;background:none;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:${t.f1}">
        <div><div style="font-size:15px;font-weight:700;color:${t.tx};text-align:left">${meal.n}</div><div style="font-size:12px;color:${t.td};text-align:left;margin-top:2px">${meal.i.length} ingredientes</div></div>
        <span style="color:${t.ac};font-size:18px;transform:rotate(${exp?180:0}deg);transition:transform .2s">▾</span>
      </button>
      ${exp?`<div class="fade-in" style="padding:0 18px 16px">${meal.i.map((item,j)=>`<div style="padding:6px 0;font-size:14px;color:${t.tm};${j===0?`border-top:1px solid ${t.bd};padding-top:12px`:""};display:flex;align-items:flex-start;gap:8px"><span style="color:${t.ac};font-size:8px;margin-top:6px">●</span>${item}</div>`).join("")}</div>`:""}
    </div>`;
  }).join("");
  
  let suppHTML="";
  if(_ss){
    suppHTML=SUPPS.map(s=>`<div style="background:${t.c1};border-radius:12px;padding:12px 16px;margin-bottom:6px;border:1px solid ${t.bd};display:flex;gap:12px;align-items:flex-start"><span style="font-size:20px">${s.e}</span><div><div style="font-size:14px;font-weight:600;color:${t.tx}">${s.n}</div><div style="font-size:12px;color:${t.tm}">${s.d}</div><div style="font-size:11px;color:${t.ac};margin-top:2px">${s.w}</div></div></div>`).join("");
  }

  $.innerHTML=`<div class="fade-up" style="padding:24px 20px 100px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button onclick="S._vd=Math.max(1,${vd}-1);_em=null;renderMenu(TH['${S.g}'])" style="background:${t.c1};border:1px solid ${t.bd};color:${t.tx};width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:18px">‹</button>
      <div style="text-align:center"><div style="font-size:12px;color:${t.tm};letter-spacing:2px">FASE ${ph} · ${PN[ph].toUpperCase()}</div><div style="font-size:28px;font-weight:900;font-family:${t.f2};color:${t.ac}">DÍA ${vd}</div></div>
      <button onclick="S._vd=Math.min(30,${vd}+1);_em=null;renderMenu(TH['${S.g}'])" style="background:${t.c1};border:1px solid ${t.bd};color:${t.tx};width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:18px">›</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${dd.o?`<span style="padding:6px 14px;background:${t.ag};color:${t.ac};border-radius:20px;font-size:12px;font-weight:700">OMAD</span>`:""}
      ${dd.cl?`<span style="padding:6px 14px;background:rgba(0,230,160,.15);color:${t.ok};border-radius:20px;font-size:12px;font-weight:700">CARGA LIMPIA</span>`:""}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:20px;background:${t.c1};border-radius:14px;padding:14px 12px;border:1px solid ${t.bd}">
      ${[{l:"Kcal",v:dd.c,cl:t.ac},{l:"P",v:dd.p+"g",cl:"#ff6b6b"},{l:"G",v:dd.f+"g",cl:"#ffd93d"},{l:"C",v:dd.cb+"g",cl:"#6bcb77"}].map(m=>`<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:800;color:${m.cl}">${m.v}</div><div style="font-size:10px;color:${t.td}">${m.l}</div></div>`).join("")}
    </div>
    ${mealsHTML}
    ${dd.t?`<div style="background:${t.ag};border-radius:14px;padding:16px 18px;margin-top:12px;border:1px solid ${t.ac}22"><div style="font-size:11px;font-weight:700;color:${t.ac};letter-spacing:1px;margin-bottom:6px">TIP DEL DÍA</div><div style="font-size:14px;color:${t.tx};line-height:1.6">${dd.t}</div></div>`:""}
    <button onclick="_ss=!_ss;renderMenu(TH['${S.g}'])" style="width:100%;padding:14px 18px;background:${t.c1};border:1px solid ${t.bd};border-radius:14px;margin-top:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:${t.f1}"><span style="font-size:14px;font-weight:600;color:${t.tx}">💊 Suplementos de hoy</span><span style="color:${t.ac};font-size:14px;transform:rotate(${_ss?180:0}deg);transition:transform .2s">▾</span></button>
    ${_ss?`<div class="fade-in" style="margin-top:8px">${suppHTML}</div>`:""}
  </div>${nav(t)}`;
  $.scrollTop=0;
}

// ── PROGRESS ──────────────────────────────────────────
function renderProg(t){
  const ws=S.ws||{0:S.wt};
  const entries=Object.entries(ws).sort((a,b)=>+a[0]-+b[0]);
  const lw=+entries[entries.length-1][1];
  const lost=S.wt-lw;
  const cc=Object.keys(S.cd||{}).length;
  const maxW=Math.max(...entries.map(e=>+e[1]));
  const minW=Math.min(...entries.map(e=>+e[1]),S.gw);
  const range=maxW-minW||1;

  let chartHTML=entries.map(([day,w],i)=>{
    const h=((+w-minW)/range)*140+20;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="font-size:10px;color:${t.tm}">${(+w).toFixed(0)}</div><div style="width:100%;max-width:40px;height:${h}px;background:linear-gradient(180deg,${t.ac},${t.ac}44);border-radius:6px 6px 0 0"></div><div style="font-size:9px;color:${t.td}">D${day}</div></div>`;
  }).join("");

  let calHTML=Array.from({length:30},(_,i)=>{
    const d=i+1;const done=S.cd?.[d];const sk=S.sk?.[d];
    return `<div style="aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${done?t.ac:sk?t.no+"33":t.c1};color:${done?"#000":sk?t.no:t.td};border:1px solid ${done?t.ac:t.bd}">${d}</div>`;
  }).join("");

  $.innerHTML=`<div class="fade-up" style="padding:32px 20px 100px">
    <div style="font-size:24px;font-weight:800;font-family:${t.f2};margin-bottom:24px">Progreso</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px">
      <div style="background:${t.c1};border-radius:14px;padding:18px;border:1px solid ${t.bd}"><div style="font-size:28px;font-weight:900;color:${t.ac}">${lost>0?"-":""}${lost.toFixed(1)} kg</div><div style="font-size:11px;color:${t.tm};letter-spacing:1px">PERDIDO</div></div>
      <div style="background:${t.c1};border-radius:14px;padding:18px;border:1px solid ${t.bd}"><div style="font-size:28px;font-weight:900;color:${t.ok}">${lw} kg</div><div style="font-size:11px;color:${t.tm};letter-spacing:1px">ACTUAL</div></div>
      <div style="background:${t.c1};border-radius:14px;padding:18px;border:1px solid ${t.bd}"><div style="font-size:28px;font-weight:900;color:${t.tx}">${cc}</div><div style="font-size:11px;color:${t.tm};letter-spacing:1px">DÍAS</div></div>
      <div style="background:${t.c1};border-radius:14px;padding:18px;border:1px solid ${t.bd}"><div style="font-size:28px;font-weight:900;color:${t.tx}">${S.gw} kg</div><div style="font-size:11px;color:${t.tm};letter-spacing:1px">OBJETIVO</div></div>
    </div>
    <div style="background:${t.c1};border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid ${t.bd}">
      <div style="font-size:12px;font-weight:700;color:${t.tm};letter-spacing:1px;margin-bottom:16px">EVOLUCIÓN</div>
      <div style="height:160px;display:flex;align-items:flex-end;gap:4px">${chartHTML}</div>
      <div style="border-top:1px dashed ${t.ok}44;margin-top:8px;padding-top:4px;font-size:10px;color:${t.ok};text-align:right">Objetivo: ${S.gw} kg</div>
    </div>
    <div style="background:${t.c1};border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid ${t.bd}">
      <div style="font-size:12px;font-weight:700;color:${t.tm};letter-spacing:1px;margin-bottom:12px">REGISTRAR PESO</div>
      <div style="display:flex;gap:10px">
        <input id="nw" type="number" placeholder="kg" style="flex:1;background:${t.c2};border:1px solid ${t.bd};color:${t.tx};padding:12px 16px;border-radius:10px;font-size:16px;font-family:${t.f1};outline:none">
        <button onclick="var v=parseFloat(document.getElementById('nw').value);if(v){var d=Math.floor((new Date()-new Date(S.sd))/864e5)+1;S.ws[d]=v;save();render()}" style="background:${t.ac};color:#000;border:none;border-radius:10px;padding:12px 20px;font-weight:700;cursor:pointer;font-family:${t.f1}">Guardar</button>
      </div>
    </div>
    <div><div style="font-size:12px;font-weight:700;color:${t.tm};letter-spacing:1px;margin-bottom:12px">CALENDARIO</div>
      <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px">${calHTML}</div>
    </div>
  </div>${nav(t)}`;
}

// ── SETTINGS ──────────────────────────────────────────
function renderSett(t){
  $.innerHTML=`<div class="fade-up" style="padding:32px 20px 100px">
    <div style="font-size:24px;font-weight:800;font-family:${t.f2};margin-bottom:24px">Ajustes</div>
    <div style="background:${t.c1};border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid ${t.bd}">
      <div style="font-size:12px;font-weight:700;color:${t.tm};letter-spacing:1px;margin-bottom:12px">PERFIL</div>
      <div style="display:flex;gap:10px">
        <input id="en" value="${S.nm}" style="flex:1;background:${t.c2};border:1px solid ${t.bd};color:${t.tx};padding:12px 16px;border-radius:10px;font-size:14px;font-family:${t.f1};outline:none">
        <button onclick="S.nm=document.getElementById('en').value;save();render()" style="background:${t.ac};color:#000;border:none;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;font-family:${t.f1};font-size:13px">Guardar</button>
      </div>
      <div style="margin-top:12px;display:flex;justify-content:space-between;font-size:14px;color:${t.tm}"><span>Plan: ${S.g}</span><span>Presupuesto: ${S.bu||"—"}</span></div>
    </div>
    <div style="background:${t.c1};border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid ${t.bd}">
      <div style="font-size:12px;font-weight:700;color:${t.tm};letter-spacing:1px;margin-bottom:8px">FECHA DE INICIO</div>
      <div style="font-size:16px;color:${t.tx}">${new Date(S.sd).toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"})}</div>
    </div>
    <div style="background:${t.c1};border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid ${t.bd}">
      <div style="font-size:12px;font-weight:700;color:${t.tm};letter-spacing:1px;margin-bottom:8px">INTOLERANCIAS</div>
      <div style="font-size:14px;color:${t.tx}">${(S.intol||[]).length?S.intol.join(", "):"Ninguna"}</div>
    </div>
    <button onclick="if(confirm('¿Seguro? Esto borra todo tu progreso.')){localStorage.removeItem('ketofy30');S={scr:'ob',obs:0};render()}" style="width:100%;padding:16px;background:transparent;border:1px solid ${t.no}44;border-radius:14px;color:${t.no};font-size:15px;font-weight:600;cursor:pointer;font-family:${t.f1};margin-top:12px">Resetear programa</button>
  </div>${nav(t)}`;
}

// ── SERVICE WORKER & MANIFEST ─────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").then(function(r){console.log("SW ok",r.scope)}).catch(function(e){console.log("SW err",e)});
}
var _dp;
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();_dp=e;
  var d=document.createElement("div");d.id="ib";
  d.innerHTML='<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#c8ff00,#00ff88);color:#000;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;font-family:Outfit,sans-serif;font-weight:700;font-size:14px;max-width:480px;margin:0 auto;border-radius:0 0 16px 16px"><span>Instalar Ketofy30</span><button onclick="_installApp()" style="background:#000;color:#c8ff00;border:none;padding:8px 20px;border-radius:8px;font-weight:700;cursor:pointer">Instalar</button></div>';
  document.body.appendChild(d);
});
function _installApp(){if(_dp){_dp.prompt();_dp.userChoice.then(function(){var b=document.getElementById("ib");if(b)b.remove();_dp=null;});}}

render();
<\/script>
</body>
</html>
